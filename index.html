<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dossiê Analítico: Inovação em Saúde 2026</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel (Compilador de JSX no navegador) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; background-color: #f3f4f6; margin: 0; padding: 0; }
    @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fade-in 0.4s ease-out forwards; }
    
    /* Scrollbar minimalista */
    .custom-scrollbar::-webkit-scrollbar { width: 5px; height: 5px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(156, 163, 175, 0.4); border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background-color: rgba(107, 114, 128, 0.8); }
    
    /* Máscara de gradiente para imagens */
    .mask-image-b-gradient { 
        mask-image: linear-gradient(to bottom, black 0%, transparent 100%); 
        -webkit-mask-image: linear-gradient(to bottom, black 0%, transparent 100%); 
    }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-2 sm:p-4 lg:p-6">
  
  <div id="root" class="w-full max-w-7xl"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // ==========================================
    // COMPONENTES DE BASE DE DESIGN
    // ==========================================
    const SlideContainer = ({ children, bg = "bg-white" }) => (
      <div className={`min-w-full h-full overflow-y-auto custom-scrollbar flex flex-col p-5 lg:p-10 box-border ${bg}`}>
        <div className="flex flex-col min-h-full pb-4">
          {children}
        </div>
      </div>
    );

    const InteractiveHint = ({ text }) => (
      <div className="inline-flex items-center gap-2 px-3 py-1.5 bg-blue-50 border border-blue-200 text-blue-700 text-xs font-bold rounded-full uppercase tracking-wider mb-3">
        <i className="fas fa-hand-pointer w-3 h-3 animate-pulse"></i>
        {text}
      </div>
    );

    const SourceBadge = ({ source, dark = false }) => (
      <div className={`inline-flex items-center gap-1.5 text-[9px] lg:text-[10px] font-bold uppercase tracking-widest px-2 py-1 rounded border mt-1 ${dark ? 'text-gray-400 bg-gray-900/50 border-gray-700' : 'text-gray-500 bg-white/50 border-gray-300'}`}>
        <i className="fas fa-book-open w-3 h-3"></i> {source}
      </div>
    );

    const InteractiveStatCard = ({ number, text, iconClass, color, bg, source, insightDetail }) => {
      const [isHovered, setIsHovered] = useState(false);
      return (
        <div 
          className={`relative p-5 lg:p-6 rounded-2xl ${bg} border-l-4 border-black shadow-sm flex-1 min-h-[220px] overflow-hidden transition-all duration-500 cursor-default group flex flex-col`}
          onMouseEnter={() => setIsHovered(true)}
          onMouseLeave={() => setIsHovered(false)}
        >
          <div className={`transition-all duration-500 ${isHovered ? 'opacity-0 translate-y-4 absolute' : 'opacity-100 translate-y-0 relative'} flex flex-col h-full justify-between flex-1`}>
            <div>
              {iconClass && <i className={`${iconClass} text-2xl lg:text-3xl mb-3 ${color}`}></i>}
              <span className={`text-3xl lg:text-5xl font-black tracking-tighter ${color} block`}>{number}</span>
              <span className="text-gray-800 mt-1 lg:mt-2 font-bold leading-snug block text-sm lg:text-base">{text}</span>
            </div>
            <div className="flex items-center gap-2 mt-4 text-[10px] lg:text-xs font-bold text-gray-500 uppercase bg-white/50 w-max px-2 py-1 rounded-md">
              <i className="fas fa-eye w-3 h-3"></i> Análise de dados
            </div>
          </div>

          <div className={`absolute inset-0 p-5 lg:p-6 bg-gray-900 text-white transition-all duration-500 flex flex-col justify-between ${isHovered ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-full z-[-1]'}`}>
            <div className="overflow-y-auto custom-scrollbar pr-2">
              <h4 className="text-[10px] lg:text-xs font-bold text-blue-400 uppercase tracking-widest mb-2 border-b border-gray-700 pb-1">Evidência Estratégica</h4>
              <p className="text-xs lg:text-sm leading-relaxed text-gray-200 mt-2">{insightDetail}</p>
            </div>
            <div className="mt-2 shrink-0"><SourceBadge source={source} dark={true} /></div>
          </div>
        </div>
      );
    };

    // ==========================================
    // PAINEL 2: GRÁFICO RANKING DE PATENTES TOP 10 + BR
    // ==========================================
    const InteractiveBarChart = () => {
      const [activeInsight, setActiveInsight] = useState(0);
      
      // Dados super enriquecidos (Top 10 Global + Brasil) com métricas de investimento e contexto estratégico real.
      const data = [
        { country: 'China', rank: '1º', display: '1.8M', width: '100%', color: 'bg-red-600', axes: ['IA Preditiva', 'Robótica'], insight: 'Apoiada pelo massivo plano "Healthy China 2030" (injetando US$ 1.2 Trilhão). A China emitiu mais de 40% das patentes globais de inteligência artificial médica e infraestrutura robótica nos últimos anos.', strategic: 'Consolidação de parcerias estatais com Big Techs asiáticas converte protótipos acadêmicos em produtos de linha de frente em meses.', source: 'OMPI/WIPO Report 2025', image: 'https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?auto=format&fit=crop&w=500&q=80', imgCaption: '' },
        { country: 'EUA', rank: '2º', display: '503 Mil', width: '35%', color: 'bg-blue-600', axes: ['Deep Tech', 'Genômica'], insight: 'Embora percam em volume para a China, os EUA lideram de forma absoluta em monetização e impacto clínico. Concentram cerca de 65% do Venture Capital mundial focado em biotecnologia molecular.', strategic: 'O ecossistema é dominado pelas Big Pharmas, que monitoram e adquirem inovações de Healthtechs já nas Fases 1 e 2 de testes do FDA.', source: 'USPTO / CB Insights 2025', image: 'https://images.unsplash.com/photo-1530497610245-94d3c16cda28?auto=format&fit=crop&w=500&q=80', imgCaption: '' },
        { country: 'Japão', rank: '3º', display: '420 Mil', width: '28%', color: 'bg-gray-800', axes: ['Longevidade', 'Sensores'], insight: 'O Japão possui uma crise demográfica única (30% da população acima de 65 anos). O governo injetou mais de US$ 30Bi no plano "Sociedade 5.0" voltado unicamente para mitigar essa pressão no sistema.', strategic: 'A pauta nacional foca em manter idosos saudáveis em casa via biossensores integrados e robótica assistencial, esvaziando leitos do Estado.', source: 'Japan Patent Office (JPO)', image: 'https://images.unsplash.com/photo-1576091160550-2173dba999ef?auto=format&fit=crop&w=500&q=80', imgCaption: '' },
        { country: 'Alemanha', rank: '4º', display: '310 Mil', width: '22%', color: 'bg-orange-500', axes: ['Aparelhos 3D', 'Indústria 4.0'], insight: 'Maior motor industrial da Europa. A Alemanha lidera patentes em engenharia de precisão aplicada à saúde, como super-ressonâncias magnéticas, válvulas ultraleves e biomanufatura.', strategic: 'Integração agressiva entre laboratórios de pesquisa (ex: Fraunhofer) e conglomerados industriais (ex: Siemens) para rápida escala global.', source: 'DPMA / OMPI 2025', image: 'https://images.unsplash.com/photo-1581093458791-9f3c3900df4b?auto=format&fit=crop&w=500&q=80', imgCaption: '' },
        { country: 'Coreia do Sul', rank: '5º', display: '260 Mil', width: '18%', color: 'bg-purple-600', axes: ['Chips Médicos', 'Óptica'], insight: 'Investe quase 5% do seu PIB em P&D global. O país utiliza sua supremacia mundial em semicondutores e telas de alta definição para dominar o diagnóstico por imagem avançada.', strategic: 'Mega-conglomerados (Chaebols como Samsung e LG) aplicam sua tecnologia de eletrônicos diretamente na saúde conectada (Wearables/IoMT).', source: 'KIPO / BioKorea 2025', image: 'https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=500&q=80', imgCaption: '' },
        { country: 'Índia', rank: '6º', display: '150 Mil', width: '15%', color: 'bg-emerald-500', axes: ['Biofármacos', 'Inov. Frugal'], insight: 'Historicamente a "farmácia do mundo" por seus genéricos (exportando US$ 50Bi/ano). O crescimento atual (+19.2% ao ano) marca a transição feroz do país para o desenvolvimento de moléculas originais e IA frugal.', strategic: 'Política "Make in India": o governo fornece fortes subsídios para forçar empresas locais a migrarem de "copiadoras" para "patenteadoras".', source: 'WIPO India Patents Bulletin', image: 'https://images.unsplash.com/photo-1579154204601-01588f351e67?auto=format&fit=crop&w=500&q=80', imgCaption: '' },
        { country: 'Suíça', rank: '7º', display: '115 Mil', width: '12%', color: 'bg-red-400', axes: ['Oncologia', 'Imunologia'], insight: 'Possui a maior densidade de patentes médicas de alto impacto financeiro per capita do mundo. Basileia e Genebra formam o principal hub da "Big Pharma" europeia (Novartis, Roche).', strategic: 'Foco quase exclusivo no alto da pirâmide de valor agregado, como terapias-alvo revolucionárias (ex: células CAR-T para oncologia e doenças raras).', source: 'Swiss IPI / Eurostat', image: 'https://images.unsplash.com/photo-1579165466741-7f35e4755660?auto=format&fit=crop&w=500&q=80', imgCaption: '' },
        { country: 'França', rank: '8º', display: '95 Mil', width: '10%', color: 'bg-blue-400', axes: ['Telemedicina', 'Oncologia'], insight: 'O agressivo plano de Estado "France 2030" alocou € 7.5 Bilhões em financiamento soberano focados unicamente na revolução do setor de saúde e biologia.', strategic: 'A França usa o fundo público "Bpifrance" para turbinar o financiamento em deep techs, mantendo a propriedade intelectual dentro das fronteiras da UE.', source: 'INPI France 2025', image: 'https://images.unsplash.com/photo-1584308666744-24d5e4a520ed?auto=format&fit=crop&w=500&q=80', imgCaption: '' },
        { country: 'Reino Unido', rank: '9º', display: '85 Mil', width: '8%', color: 'bg-indigo-600', axes: ['Genômica', 'Dados / IA'], insight: 'O Serviço Nacional de Saúde (NHS) atende mais de 65 milhões de pessoas. Essa é a maior e mais unificada base de dados demográficos reais e longitudinais do planeta livre.', strategic: 'O governo "abre" (sob anonimato) dados do NHS para treinar os algoritmos de IA de Big Techs, atraindo as sedes das melhores HealthTechs do mundo (ex: DeepMind).', source: 'UKIPO / NHS Digital', image: 'https://images.unsplash.com/photo-1532187643603-c76088e5e6e6?auto=format&fit=crop&w=500&q=80', imgCaption: '' },
        { country: 'Israel', rank: '10º', display: '70 Mil', width: '6%', color: 'bg-cyan-500', axes: ['Cyber-Saúde', 'Algoritmos'], insight: 'Reconhecida globalmente como a "Startup Nation", Israel tem a maior densidade global de HealthTechs baseadas em sofisticação de software per capita.', strategic: 'Genialidade em "spin-offs" militares: as mesmas tecnologias (visão computacional, IA, cibersegurança) usadas nas forças armadas são convertidas por ex-militares em diagnósticos médicos precisos.', source: 'Israel Innovation Authority', image: 'https://images.unsplash.com/photo-1584036561566-baf8f5f1b144?auto=format&fit=crop&w=500&q=80', imgCaption: '' },
        { country: 'Brasil', rank: '24º', display: '31 Mil', width: '4%', color: 'bg-yellow-500', axes: ['Biodiversidade', 'Pesquisa'], insight: 'A posição reflete um grande mercado consumidor, mas de baixa autonomia: 67% das patentes aplicadas aqui são de matrizes estrangeiras visando lucro no SUS.', strategic: 'O "gap" nacional é financeiro. O Brasil tem biólogos de excelência e a maior biodiversidade do mundo, mas falha em tracionar Fundos de Risco (VCs) para escalar a pesquisa universitária à indústria.', source: 'INPI - Indicadores 2024/25', image: 'https://images.unsplash.com/photo-1532187863486-abf9dbad1b69?auto=format&fit=crop&w=500&q=80', imgCaption: '' },
      ];

      return (
        <div className="flex flex-col lg:flex-row h-full gap-5 lg:gap-8 flex-1">
          {/* Coluna Esquerda - Gráfico de Barras Top 10 + Brasil */}
          <div className="w-full lg:w-4/12 flex flex-col gap-2 border-b lg:border-b-0 lg:border-r border-gray-200 pb-4 lg:pb-0 lg:pr-6 shrink-0 h-[250px] lg:h-auto">
            <div className="mb-2"><InteractiveHint text="Passe o cursor sobre a lista global" /></div>
            <div className="flex-1 flex flex-col gap-1 overflow-y-auto custom-scrollbar pr-2">
              {data.map((item, index) => (
                <div key={item.country} className="group cursor-pointer relative" onMouseEnter={() => setActiveInsight(index)}>
                  <div className={`p-1.5 lg:p-2 rounded-lg transition-all duration-300 ${activeInsight === index ? 'bg-gray-100 shadow-sm border border-gray-200' : 'hover:bg-gray-50 border border-transparent'}`}>
                    <div className="flex justify-between items-center mb-1">
                      <div className="flex items-center gap-2">
                        <div className={`w-5 h-5 flex items-center justify-center rounded text-[9px] font-black transition-colors ${activeInsight === index ? 'bg-gray-900 text-white' : 'bg-white text-gray-500 border border-gray-200 group-hover:border-gray-300'}`}>{item.rank}</div>
                        <span className={`text-[11px] lg:text-[13px] font-bold uppercase tracking-wide ${activeInsight === index ? 'text-gray-900' : 'text-gray-600'}`}>{item.country === 'Brasil' && <i className="fas fa-map-marker-alt text-yellow-600 mr-1"></i>}{item.country}</span>
                      </div>
                      <span className="text-[10px] lg:text-xs font-black text-gray-800">{item.display}</span>
                    </div>
                    {/* Barra de Progresso Minimizada */}
                    <div className="w-full bg-gray-200 h-1.5 lg:h-2 rounded-full overflow-hidden ml-7" style={{ width: 'calc(100% - 28px)' }}>
                      <div className={`h-full ${item.color} transition-all duration-700 ease-out ${activeInsight === index ? 'opacity-100' : 'opacity-40'}`} style={{ width: item.width }}></div>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
          
          {/* Coluna Direita - Painel Deep Dive com Dark Mode Elegante */}
          <div className="w-full lg:w-8/12 bg-gray-900 rounded-3xl p-5 lg:p-8 text-white flex flex-col shadow-2xl relative overflow-hidden flex-1 border border-gray-800">
            <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between mb-5 shrink-0 border-b border-gray-700 pb-4 gap-4">
               <div className="flex items-center gap-3">
                 <i className={`fas fa-chart-line text-2xl lg:text-3xl ${data[activeInsight].country === 'Brasil' ? 'text-yellow-400' : 'text-blue-400'}`}></i>
                 <div>
                   <h4 className={`font-black text-2xl lg:text-3xl tracking-tight leading-none ${data[activeInsight].country === 'Brasil' ? 'text-yellow-400' : 'text-white'}`}>{data[activeInsight].country}</h4>
                   <div className="flex gap-2 mt-2">
                     {data[activeInsight].axes.map((axis, i) => (<span key={i} className="text-[9px] px-2 py-0.5 rounded font-bold uppercase tracking-widest bg-gray-800 text-gray-300 border border-gray-700">{axis}</span>))}
                   </div>
                 </div>
               </div>
               <div className="bg-white/10 px-4 py-2 rounded-xl border border-white/20 flex items-center gap-2 shrink-0">
                 <i className="fas fa-trophy text-amber-400 text-sm"></i>
                 <span className="font-black text-xs lg:text-sm tracking-widest uppercase text-gray-100">{data[activeInsight].rank} Posição Global</span>
               </div>
            </div>

            <div className="flex flex-col lg:flex-row gap-6 flex-1 overflow-y-auto custom-scrollbar pr-2">
              <div className="flex flex-col gap-4 flex-1">
                <p className="text-gray-300 text-xs lg:text-sm leading-relaxed font-medium">
                  <strong className="text-white block mb-2 uppercase text-[10px] tracking-widest">O Fundo Macroeconômico:</strong>
                  {data[activeInsight].insight}
                </p>
                
                <div className="bg-gradient-to-r from-gray-800/80 to-gray-800/20 p-4 lg:p-5 rounded-2xl border-l-4 border-blue-500 mt-auto shadow-inner">
                  <div className="text-[10px] lg:text-xs text-blue-300 font-black uppercase tracking-widest mb-2 flex items-center gap-2"><i className="fas fa-chess-knight"></i> Estratégia de Estado / Mercado</div>
                  <p className="text-xs lg:text-sm text-gray-100 leading-relaxed font-medium">{data[activeInsight].strategic}</p>
                </div>
              </div>
              
              <div className="flex flex-col w-full lg:w-5/12 shrink-0">
                <div className="w-full h-40 lg:h-48 bg-black rounded-2xl overflow-hidden mb-3 border border-gray-700 shadow-md">
                  <img src={data[activeInsight].image} alt={data[activeInsight].imgCaption} className="w-full h-full object-cover opacity-80 hover:opacity-100 transition-opacity duration-500" />
                </div>
                <span className="text-[9px] text-gray-500 italic mb-2 leading-tight text-center bg-black/40 py-1.5 rounded">{data[activeInsight].imgCaption}</span>
                <div className="mt-auto"><SourceBadge source={data[activeInsight].source} dark={true} /></div>
              </div>
            </div>
          </div>
        </div>
      );
    };

    // --- PAINEL 3: GRÁFICO RANKING GLOBAL DE HOSPITAIS ---
    const RankingHospitals = () => {
      const [selectedRank, setSelectedRank] = useState(1);
      
      const hospitals = [
        { rank: 1, name: 'Mayo Clinic', location: 'Rochester, EUA', type: 'Líder Mundial', iconClass: "fas fa-star", insight: 'Atendendo mais de 1.3 Milhão de pessoas anualmente, o hospital lidera o ranking isolado. Firmou uma parceria decenal estratégica (multibilionária) com o Google Cloud, aplicando processamento de IA em massa nos prontuários para personalizar a medicina genômica em tempo real para cada paciente internado.', note: 'Uso maciço de IA preditiva no fluxo hospitalar reduziu severamente erros de triagem e otimizou giros de leitos.', source: 'Newsweek World\'s Best Hospitals 2024 / Mayo Clinic Data', image: 'https://images.unsplash.com/photo-1519494026892-80bbd2d6fd0d?auto=format&fit=crop&w=500&q=80', imgCaption: '' },
        { rank: 2, name: 'Cleveland Clinic', location: 'Ohio, EUA', type: 'Vanguarda Tecnológica', iconClass: "fas fa-microchip", insight: 'Revolucionou a história da pesquisa ao investir US$ 300 Milhões no "Discovery Accelerator" em consórcio com a IBM. Instalaram, dentro de suas paredes, o primeiro Computador Quântico dedicado puramente à saúde do mundo. O foco? Simular combinações de dobras de proteínas para curar câncer e patologias complexas em dias, não mais em décadas.', note: 'Primeira operação hospitalar de Computação Quântica em solo livre do planeta.', source: 'IBM Quantum Healthcare / Cleveland Clinic Press', image: 'https://images.unsplash.com/photo-1635070041078-e363dbe005cb?auto=format&fit=crop&w=500&q=80', imgCaption: '' },
        { rank: 6, name: 'Charité - Berlin', location: 'Alemanha', type: 'Líder Europeu', iconClass: "fas fa-microscope", insight: 'Sendo o maior hospital universitário da Europa, o Charité abriga a vanguarda mundial em "Medicina Translacional" — a ciência de capturar rapidamente uma descoberta laboratorial e transformá-la em tratamento aplicável nos leitos (Bedside to Bench to Bedside). Eles lideram a integração entre dados hospitalares clínicos europeus e deep learning.', note: 'É o hospital de referência global em conectar pesquisa biológica fundamental com a cama do paciente.', source: 'Newsweek World Ranking 2024 / Charité Research', image: 'https://images.unsplash.com/photo-1516549655169-df83a0774514?auto=format&fit=crop&w=500&q=80', imgCaption: '' },
        { rank: 10, name: 'Karolinska Institutet', location: 'Estocolmo, Suécia', type: 'Excelência Genômica', iconClass: "fas fa-dna", insight: 'Lar sagrado do comitê oficial do Prêmio Nobel de Fisiologia/Medicina. O hospital universitário Karolinska atua como ponta de lança planetária em ensaios clínicos hiper-rigorosos. Inovam de maneira acelerada em biologia imunológica, transplantes sintéticos e biotecnologias aplicadas ao reparo do sistema nervoso central.', note: 'Berço intelectual que dita os rumos das terapias imunológicas de elite mundiais.', source: 'Newsweek 2024 / Swedish Healthcare Data', image: 'https://images.unsplash.com/photo-1532094349884-543bc11b234d?auto=format&fit=crop&w=500&q=80', imgCaption: '' },
        { rank: 16, name: 'Albert Einstein', location: 'São Paulo, Brasil', type: 'Líder Latam', iconClass: "fas fa-rocket", insight: 'Coroado o 1º hospital da América Latina há mais de uma década. Diferencia-se mundialmente porque não apenas absorve tecnologia rica, mas a fomenta: o hospital fundou a incubadora "Eretz.bio", um ecossistema feroz que já abrigou mais de 130 startups (healthtechs), direcionando dezenas de milhões à inovação biotecnológica local e internacional.', note: 'A aceleradora Eretz.bio é a principal porta de entrada e filtragem para inovações em IA médica do Sul Global.', source: 'Relatório Einstein de Inovação / Newsweek Latam', image: 'https://images.unsplash.com/photo-1559839734-2b71ea197ec2?auto=format&fit=crop&w=500&q=80', imgCaption: '' },
        { rank: 189, name: 'HC-FMUSP', location: 'São Paulo, Brasil', type: 'Potência Pública', iconClass: "fas fa-hospital-user", insight: 'O feito é monumental: é o único hospital 100% público do Brasil a furar o rigoroso estrato global da Newsweek. Com o braço tecnológico InovaHC, o complexo de 2.400 leitos gerou mais de R$ 40 Milhões em co-criações. Ele atua como o laboratório vivo ("Sandbox") essencial para validar healthtechs e algoritmos enfrentando os desafios brutais da diversidade genética e logística do SUS.', note: 'O InovaHC submete a tecnologia do setor privado ao gigantesco e complexo teste de stress real do SUS.', source: 'Newsweek 2024 / Balanço Oficial InovaHC USP', image: 'https://images.unsplash.com/photo-1582719508461-905c673771fd?auto=format&fit=crop&w=500&q=80', imgCaption: '' },
      ];
      return (
        <div className="flex flex-col h-full flex-1">
           <div className="mb-4 shrink-0"><InteractiveHint text="Navegue na lista para verificar o lastro tecnológico da vanguarda hospitalar" /></div>
          <div className="flex flex-col lg:flex-row gap-6 lg:gap-8 flex-1 overflow-hidden">
            
            {/* Menu Lateral Hospitais */}
            <div className="w-full lg:w-4/12 flex flex-col gap-2 overflow-y-auto custom-scrollbar pb-2 pr-2">
              {hospitals.map((hosp) => (
                <button 
                  key={hosp.rank} onClick={() => setSelectedRank(hosp.rank)}

          {/* ÁREA DE SLIDER CENTRAL */}
          <div className="flex-1 relative bg-white overflow-hidden">
            <div className="absolute top-0 left-0 w-full h-full flex transition-transform duration-[800ms] ease-[cubic-bezier(0.87,0,0.13,1)]" style={{ transform: `translateX(-${currentSlide * 100}%)` }}>
              {slides.map((slide) => (
                <div key={slide.id} className="min-w-full h-full bg-white">
                  {slide.render()}
                </div>
              ))}
            </div>
          </div>

          {/* RODAPÉ E NAVEGAÇÃO */}
          <div className="bg-gray-50 border-t border-gray-200 p-4 lg:p-6 flex justify-between items-center px-5 lg:px-10 z-20 shrink-0">
            <div className="flex items-center gap-5 lg:gap-8">
              <div className="bg-amber-100 p-2 rounded-lg border border-amber-200 shadow-inner hidden sm:block"><i className="fas fa-bolt text-amber-500 text-xl drop-shadow-sm"></i></div>
              <div className="flex gap-2 lg:gap-2.5">
                {slides.map((_, i) => (
                  <button 
                    key={i} onClick={() => setCurrentSlide(i)} aria-label={`Ir para Painel ${i + 1}`}
                    className={`h-2 lg:h-3 transition-all duration-500 rounded-full ${currentSlide === i ? 'w-10 lg:w-14 bg-blue-600 shadow-md' : 'w-2 lg:w-3 bg-gray-300 hover:bg-gray-400'}`}
                  ></button>
                ))}
              </div>
            </div>
            
            <div className="flex gap-3 lg:gap-4">
              <button onClick={prevSlide} className="px-5 lg:px-8 py-2.5 lg:py-3 flex items-center gap-2 rounded-xl font-bold text-xs lg:text-sm bg-white border-2 border-gray-200 text-gray-700 hover:bg-gray-50 hover:border-gray-300 transition-all shadow-sm focus:ring-4 focus:ring-gray-100">
                <i className="fas fa-arrow-left"></i> <span className="hidden sm:inline uppercase tracking-widest text-[10px] lg:text-xs">Anterior</span>
              </button>
              <button onClick={nextSlide} className="px-5 lg:px-8 py-2.5 lg:py-3 flex items-center gap-2 rounded-xl font-black text-xs lg:text-sm bg-black border-2 border-black text-white hover:bg-gray-800 transition-all shadow-xl hover:shadow-black/20 focus:ring-4 focus:ring-gray-300">
                <span className="hidden sm:inline uppercase tracking-widest text-[10px] lg:text-xs">Avançar Estudo</span> <i className="fas fa-arrow-right"></i>
              </button>
            </div>
          </div>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
