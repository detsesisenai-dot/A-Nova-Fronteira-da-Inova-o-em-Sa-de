                <h2 className="text-2xl lg:text-4xl font-black text-gray-900 flex items-center gap-2"><span className="text-blue-600">1.</span> A Inflexão Global</h2>
                <i className="fas fa-brain text-4xl text-gray-300 hidden sm:block"></i>
              </div>
              <p className="text-sm lg:text-base text-gray-600 mb-6 max-w-4xl border-l-4 border-gray-200 pl-4 shrink-0">A IA transacionou de "custo experimental" para o centro da eficiência preditiva em triagem e genômica.</p>
              <div className="flex flex-col md:flex-row gap-4 lg:gap-6 flex-1">
                <InteractiveStatCard iconClass="fas fa-chart-line" color="text-blue-600" bg="bg-blue-50" number="US$ 504 Bi" text="Mercado de IA na Saúde (2032)" insightDetail="O salto de US$ 39Bi (2025) é guiado pela descoberta algorítmica de fármacos." source="Grand View Research" />
                <InteractiveStatCard iconClass="fas fa-globe" color="text-emerald-600" bg="bg-emerald-50" number="49%" text="Domínio da América do Norte" insightDetail="Concentração gerada por alianças entre Big Techs e Hospitais para treinar modelos fundacionais." source="MarketWatch" />
                <div className="p-5 lg:p-6 rounded-2xl bg-gray-900 text-white flex flex-col justify-between border border-gray-800 flex-1 min-h-[200px]">
                  <div>
                    <h3 className="text-lg lg:text-xl font-bold mb-2 text-amber-400">"Inovação Reversa"</h3>
                    <p className="text-gray-300 text-xs lg:text-sm leading-relaxed mb-3">Soluções frugais criadas na África invadem hospitais americanos para cortar custos básicos.</p>
                  </div>
                  <SourceBadge source="Fórum Econômico Mundial" />
                </div>
              </div>
            </SlideContainer>
          )
        },
        { id: "grafico-patentes", headerTitle: "Corrida Estratégica", headerIcon: "fas fa-chart-bar", render: () => <SlideContainer><InteractiveBarChart /></SlideContainer> },
        { id: "grafico-hospitais", headerTitle: "Vanguarda Hospitalar", headerIcon: "fas fa-trophy", render: () => <SlideContainer><RankingHospitals /></SlideContainer> },
        { id: "grafico-disruptivas", headerTitle: "Fronteiras da Medicina", headerIcon: "fas fa-syringe", render: () => <SlideContainer bg="bg-gray-900"><DisruptiveInnovations /></SlideContainer> },
        { id: "grafico-solucoes", headerTitle: "Centros de Pesquisa Aplicada", headerIcon: "fas fa-vial", render: () => <SlideContainer><GlobalSolutionsCenters /></SlideContainer> },
        { id: "grafico-brasil", headerTitle: "Raio-X Brasil", headerIcon: "fas fa-chart-pie", render: () => <SlideContainer><BrazilianPatentsParadox /></SlideContainer> },
        {
          id: "contexto-goias-1",
          render: () => (
            <SlideContainer>
              <div className="flex justify-between items-end mb-4 shrink-0">
                <h2 className="text-2xl lg:text-4xl font-black text-gray-900 flex items-center gap-2"><span className="text-blue-600">2.</span> A Singularidade Goiana</h2>
                <i className="fas fa-lightbulb text-4xl text-gray-300 hidden sm:block"></i>
              </div>
              <p className="text-sm lg:text-base text-gray-600 mb-6 max-w-4xl border-l-4 border-gray-200 pl-4 shrink-0">Emprestando a expertise científica do agronegócio, Goiás moldou um ambiente fértil para a biotecnologia humana (HealthTechs).</p>
              <div className="flex flex-col md:flex-row gap-4 lg:gap-6 flex-1">
                <InteractiveStatCard iconClass="fas fa-heartbeat" color="text-gray-900" bg="bg-white border-2 border-black" number="+29%" text="Novas Startups" insightDetail="A transição de Agro para Saúde cria o ecossistema bioeconômico ideal no estado." source="Mapeamento Startups GO" />
                <InteractiveStatCard iconClass="fas fa-bullseye" color="text-white" bg="bg-blue-600 border-2 border-black" number="R$ 30M" text="Hub Goiás" insightDetail="Injeção de capital direto do governo para validação e escala comercial." source="Secti-GO" />
                <div className="bg-emerald-50 border-2 border-emerald-600 rounded-2xl p-5 lg:p-6 flex flex-col justify-between flex-1 min-h-[200px]">
                  <div>
                    <div className="inline-block px-2 py-1 bg-emerald-600 text-white rounded text-[10px] font-bold uppercase mb-2">Validação Global</div>
                    <h4 className="text-xl font-black mb-2 text-emerald-900">Case Fitoprot</h4>
                    <p className="text-emerald-800 text-xs lg:text-sm leading-relaxed mb-3">Patentes da UFG validaram viabilidade comercial vencendo prêmios massivos.</p>
                    <SourceBadge source="Parque Tecnológico Samambaia" />
                  </div>
                </div>
              </div>
            </SlideContainer>
          )
        },
        { id: "grafico-goias-timeline", headerTitle: "O Salto de Goiás", headerIcon: "fas fa-chart-line", render: () => <SlideContainer><GoiasTrend /></SlideContainer> },
        {
          id: "contexto-goias-2",
          render: () => (
            <SlideContainer>
              <div className="flex justify-between items-end mb-4 shrink-0">
                 <h2 className="text-2xl lg:text-4xl font-black text-gray-900 flex items-center gap-2"><span className="text-blue-600">3.</span> A Máquina Física e Digital</h2>
                 <i className="fas fa-server text-4xl text-gray-300 hidden sm:block"></i>
              </div>
              <p className="text-sm lg:text-base text-gray-600 mb-6 border-l-4 border-gray-200 pl-4 shrink-0">Goiás planejou a integração das duas matrizes operacionais (Soft/Hard) para inovações vitais.</p>

              <div className="flex flex-col md:flex-row gap-6 lg:gap-8 flex-1">
                <div className="flex-1 flex flex-col gap-3 lg:gap-4">
                  <div className="text-gray-800 font-bold uppercase text-[10px] lg:text-xs bg-gray-100 px-3 py-1 w-max rounded-md flex items-center gap-1.5"><i className="fas fa-heartbeat"></i> Digital & Clínico</div>
                  <div className="p-4 lg:p-5 bg-gray-900 text-white rounded-2xl shadow-md border-l-4 border-blue-500">
                    <h4 className="font-bold text-base lg:text-lg mb-1 text-blue-400">FHIR®️ no SUS</h4>
                    <p className="text-gray-300 text-xs lg:text-sm mb-2">O histórico viaja de maneira segura até a triagem algorítmica.</p>
                  </div>
                  <div className="p-4 lg:p-5 bg-white border border-gray-200 rounded-2xl shadow-sm flex-1">
                    <h4 className="font-bold text-base lg:text-lg mb-1 text-gray-900">Hospital das Clínicas</h4>
                    <p className="text-gray-600 text-xs lg:text-sm">"Laboratório vivo" para testar inovações do Ceti-Saúde.</p>
                  </div>
                </div>

                <div className="flex-1 bg-blue-50 rounded-3xl p-5 lg:p-8 border border-blue-100 flex flex-col relative overflow-hidden">
                   <div className="text-blue-900 font-bold uppercase text-[10px] lg:text-xs bg-white/50 px-3 py-1 w-max rounded-md flex items-center gap-1.5 mb-4 relative z-10"><i className="fas fa-plane-departure"></i> Infra / Smart Cities</div>
                  <div className="mb-4 relative z-10 bg-white/70 p-3 rounded-xl">
                    <h4 className="font-black text-sm lg:text-lg text-gray-900 mb-1">Antares Polo Aeronáutico</h4>
                    <p className="text-gray-700 text-[10px] lg:text-xs">Ponte para genômica e UTI aérea.</p>
                  </div>
                  <div className="relative z-10 bg-white/70 p-3 rounded-xl">
                    <h4 className="font-black text-sm lg:text-lg text-gray-900 mb-1">Inova Aparecida</h4>
                    <p className="text-gray-700 text-[10px] lg:text-xs">Complexo para hospedar farmacêuticas.</p>
                  </div>
                  <i className="fas fa-building text-blue-200 opacity-30 absolute -bottom-10 -right-10 text-[200px]"></i>
                </div>
              </div>
            </SlideContainer>
          )
        }
      ];

      const nextSlide = () => setCurrentSlide((prev) => (prev === slides.length - 1 ? 0 : prev + 1));
      const prevSlide = () => setCurrentSlide((prev) => (prev === 0 ? slides.length - 1 : prev - 1));

      useEffect(() => {
        const handleKeyDown = (e) => {
          if (e.key === 'ArrowRight') nextSlide();
          if (e.key === 'ArrowLeft') prevSlide();
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, []);

      return (
        <div className="relative w-full max-w-7xl h-[90vh] min-h-[600px] bg-white shadow-2xl rounded-2xl sm:rounded-3xl flex flex-col overflow-hidden border border-gray-300">
          
          <div className={`px-4 lg:px-8 py-3 lg:py-4 border-b border-gray-100 flex justify-between items-center bg-white z-20 shadow-sm shrink-0 transition-all duration-300 ${slides[currentSlide].headerTitle ? 'h-auto opacity-100' : 'h-0 opacity-0 overflow-hidden py-0 border-transparent'}`}>
             {slides[currentSlide].headerTitle && (
               <>
                 <div className="flex items-center gap-2 lg:gap-4">
                    <div className="p-1.5 lg:p-2 bg-blue-50 border border-blue-100 rounded-lg shadow-inner flex items-center justify-center">
                      <i className={`${slides[currentSlide].headerIcon} text-blue-600 text-lg`}></i>
                    </div>
                    <h2 className="text-sm sm:text-base lg:text-xl font-black text-gray-900 tracking-tight uppercase truncate">{slides[currentSlide].headerTitle}</h2>
                 </div>
                 <div className="text-[9px] lg:text-[10px] font-bold text-gray-500 bg-gray-100 px-2 lg:px-3 py-1 lg:py-1.5 rounded-full uppercase tracking-wider hidden sm:flex items-center gap-1.5 shrink-0">
                    <i className="fas fa-heartbeat"></i> Painel {currentSlide + 1}/{slides.length}
                 </div>
               </>
             )}
          </div>

          <div className="flex-1 relative bg-white overflow-hidden">
            <div className="absolute top-0 left-0 w-full h-full flex transition-transform duration-[600ms] ease-[cubic-bezier(0.645,0.045,0.355,1)]" style={{ transform: `translateX(-${currentSlide * 100}%)` }}>
              {slides.map((slide) => (
                <div key={slide.id} className="min-w-full h-full">
                  {slide.render()}
                </div>
              ))}
            </div>
          </div>

          <div className="bg-gray-50 border-t border-gray-200 p-3 lg:p-4 flex justify-between items-center px-4 lg:px-8 z-20 shrink-0">
            <div className="flex items-center gap-4 lg:gap-6">
              <i className="fas fa-bolt text-amber-500 text-lg"></i>
              <div className="flex gap-1.5 lg:gap-2">
                {slides.map((_, i) => (
                  <button 
                    key={i} onClick={() => setCurrentSlide(i)} aria-label={`Slide ${i + 1}`}
                    className={`h-1.5 lg:h-2 transition-all duration-300 rounded-full ${currentSlide === i ? 'w-6 lg:w-8 bg-black shadow-md' : 'w-1.5 lg:w-2 bg-gray-300 hover:bg-gray-500'}`}
                  ></button>
                ))}
              </div>
            </div>
            
            <div className="flex gap-2 lg:gap-3">
              <button onClick={prevSlide} className="px-3 lg:px-5 py-1.5 lg:py-2 flex items-center gap-1 lg:gap-2 rounded-full font-bold text-xs lg:text-sm bg-white border border-gray-300 text-gray-700 hover:bg-gray-100 transition-colors shadow-sm">
                <i className="fas fa-chevron-left"></i> <span className="hidden sm:inline">Voltar</span>
              </button>
              <button onClick={nextSlide} className="px-3 lg:px-5 py-1.5 lg:py-2 flex items-center gap-1 lg:gap-2 rounded-full font-bold text-xs lg:text-sm bg-black text-white hover:bg-gray-800 transition-colors shadow-md">
                <span className="hidden sm:inline">Avançar</span> <i className="fas fa-chevron-right"></i>
              </button>
            </div>
          </div>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
